<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MissionMesh Demo - Design Preview</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f6f7f4; color: #172625; }
      main { max-width: 960px; margin: 0 auto; padding: 48px 24px; }
      section { border: 1px solid #d8dedb; background: white; padding: 24px; margin: 16px 0; border-radius: 8px; }
      .hero { background: #e8f3f2; }
      .cta { display: inline-block; background: #0d6f72; color: white; padding: 12px 16px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Schedule complex meetings without the calendar chase.</h1>
        <p>Responsive layout includes hero, workflow, benefits, proof, and CTA sections.</p>
        <span class="cta">Join early access</span>
      </section>
      <section><h2>Mobile notes</h2><p>Hero stacks first, CTA remains visible, and benefit cards become a single column.</p></section>
    </main>
  </body>
</html>
